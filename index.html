<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Digital Shop 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to right, #ffc0cb, #ff69b4);
    text-align: center;
}

/* LOGIN */
#loginPage {
    margin-top: 100px;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    width: 200px;
}

button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: hotpink;
    color: white;
    cursor: pointer;
}

button:hover {
    background: deeppink;
}

/* PRODUK */
#productPage {
    display: none;
}

.product {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    display: inline-block;
    width: 150px;
    cursor: pointer;
}

/* LOGOUT */
.logout {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    font-size: 12px;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 20px;
    border-radius: 15px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="box">
        <h2>Login Admin 💖</h2>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Masuk 🚀</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>

<!-- PRODUCT PAGE -->
<div id="productPage">
    <button class="logout" onclick="logout()">Logout 🚪</button>
    <h2>Produk Digital Imut 💕</h2>

    <div class="product" onclick="buy('Ebook Bisnis 💼')">Ebook 💼</div>
    <div class="product" onclick="buy('Template Canva 🎨')">Canva 🎨</div>
    <div class="product" onclick="buy('Preset Lightroom 📸')">Preset 📸</div>
    <div class="product" onclick="buy('Script Bot 🤖')">Bot 🤖</div>
    <div class="product" onclick="buy('Desain Logo 🖌️')">Logo 🖌️</div>
    <div class="product" onclick="buy('Video Editing 🎬')">Video 🎬</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h3 id="namaProduk"></h3>
        <p>Rekening: 085708829924 💳</p>
        <p>Kirim bukti pembayaran ya 💖</p>
        <button onclick="confirmBuy()">Beli 💸</button>
        <button onclick="closePopup()">Cancel ❌</button>
    </div>
</div>

<script>
// AUTO LOGIN CHECK
if (localStorage.getItem("login") === "true") {
    showProduct();
}

// LOGIN
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        localStorage.setItem("login", "true");
        showProduct();
    } else {
        document.getElementById("error").innerText = "Login gagal 😢";
    }
}

// SHOW PRODUCT PAGE
function showProduct() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("productPage").style.display = "block";
}

// LOGOUT
function logout() {
    localStorage.removeItem("login");
    document.getElementById("productPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
}

// BELI PRODUK
function buy(nama) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("namaProduk").innerText = nama;
}

// CLOSE POPUP
function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// KONFIRMASI BELI
function confirmBuy() {
    alert("Pembelian sukses 🎉💖");
    closePopup();
}
</script>

</body>
</html>
